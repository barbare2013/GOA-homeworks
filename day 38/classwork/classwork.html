<!-- 1) ჩამოთვალეთ ყველა property რაც ვისწავლეთ გაკვეთილზე და მოიყვანეთ მათი გამოყენების მაგალითები -->
<!--1)text-shadow- ანიჭებს ტექსტს ჩრდილს რომელიც შეიძლება იყოს დაბლა-მარჯვნივ ან მარცხნივ და მაღლა-მარჯვნივ ან მარცხნივ.
ასევე ჩვენ შეგვიძლია ჩრდილი გავხადოთ ბუნდოვანი.
მაგ:-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="text-shadow:6px, 4px, 3px;">hello world</h1>
</body>
</html>

<!-- 2)text-transform- ტექსტის ასოებს გადაააქცევს დიდად ან პატარებად
მაგ: lowercase-სიტყვაში ყველას ასოს გადააქცევს პატარა ასოებად.
uppercase-სიტყვაში ყველა ასოს გადააქცევს დიდი ასოებაც
capitalize-ყველა სიტყვის პირველ ასოს გადააქცევს დიდა ასოთ.
მაგ: -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p style="text-transform: capitalize;">goal oriented academy</p>
</body>
</html>

<!-- 3)text-decoration არსებობს ბევრ ნაირი მაგ:
dashed-წყვეტილი
dotted-დაკოპლილი
duble-ორმაგი
line-through-ხაზი შუაში
none-არაფერი
overline-ხაზი ზემოდან
solid-სწორი
underline-ხაზი ქვემოდან
wavy-ტალღოვანი 
მაგ:-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="text-decoration: dashed;">goa</h1>
    <h1 style="text-decoration: dotted;">goa</h1>
    <h1 style="text-decoration:double ;">goa</h1>
    <h1 style="text-decoration:line-through ;">goa</h1>
    <h1 style="text-decoration: none;">goa</h1>
    <h1 style="text-decoration:overline ;">goa</h1>
    <h1 style="text-decoration:solid ;">goa</h1>
    <h1 style="text-decoration:underline ;">goa</h1>
    <h1 style="text-decoration:wavy ;">goa</h1>
</body>
</html>
