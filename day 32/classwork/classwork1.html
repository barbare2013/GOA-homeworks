<!-- interal CSS-ით შგვიძლია რამდენიმე თეგი ერთნაირად გავსტილოთ და ერთხელ მოგვიწევს მხოლოდ დაწრა და არა ბევრჯერ.-->




<!-- 6) შექმენით h1 და p თეგები და გასტილეთ ერთნაირად (ერთი სელექტორით) -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1, p{
            color: purple;
            background-color: pink;
        }
    </style>
</head>
<body>
    <h1>goa</h1>
    <p>hello world</p>
</body>
</html>
