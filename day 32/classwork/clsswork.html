<!-- 3) შექმენით 1 h1 თეგი და გასტილეთ inline CSS-ით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="color: blue; background-color: aqua;">inline css</h1>
</body>
</html>



<!-- 4) შექმენით 2 p თეგი და გასტილეთ internal CSS-ით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        p{
            color: brown;
            background-color: darkblue;
        }
    </style>
</head>
<body>
<p>inline css</p>
<p >goal oriented aqademy</p>
</body>
</html>
